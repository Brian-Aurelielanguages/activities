<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>La Météo en Français – Aurelie Languages</title>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700;900&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet"/>
  <style>
    :root {
      --teal:  #afe4de;
      --sand:  #e4d5af;
      --plum:  #2f1c4b;
      --navy:  #323b60;
      --white: #ffffff;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'DM Sans', sans-serif;
      background: var(--plum);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      overflow-x: hidden;
    }

    body::before {
      content: '';
      position: fixed; inset: 0;
      background:
        radial-gradient(ellipse 80% 60% at 10% 10%, rgba(175,228,222,.18) 0%, transparent 60%),
        radial-gradient(ellipse 60% 50% at 90% 80%, rgba(50,59,96,.6) 0%, transparent 65%);
      pointer-events: none;
      z-index: 0;
    }

    @keyframes pop { from { transform: scale(0.8); opacity: 0; } to { transform: scale(1); opacity: 1; } }
    @keyframes fadeIn { from { opacity: 0; transform: translateY(12px); } to { opacity: 1; transform: translateY(0); } }
    @keyframes shake { 0%,100%{transform:translateX(0)} 25%{transform:translateX(-6px)} 75%{transform:translateX(6px)} }
    @keyframes cardIn { from { opacity: 0; transform: translateY(20px) scale(.97); } to { opacity: 1; transform: none; } }

    /* ── Header ── */
    header {
      position: relative; z-index: 1;
      width: 100%; max-width: 680px;
      padding: 36px 24px 12px;
      display: flex; flex-direction: column; align-items: center; gap: 4px;
      animation: fadeIn 0.6s ease;
    }
    .header-logo {
      position: absolute; top: 24px; right: 24px;
      width: 72px; height: 72px;
      border-radius: 14px; object-fit: cover;
      box-shadow: 0 4px 18px rgba(0,0,0,.4);
    }
    footer {
      position: relative; z-index: 1;
      width: 100%; text-align: center;
      padding: 16px 24px 28px;
      font-family: 'DM Sans', sans-serif;
      font-size: 12px; font-weight: 500;
      color: rgba(175,228,222,.3);
      letter-spacing: .08em;
    }
    .brand {
      font-family: 'Playfair Display', serif;
      font-size: clamp(1.6rem, 4vw, 2.4rem);
      font-weight: 900; color: var(--teal);
      letter-spacing: .04em; text-align: center;
    }
    .brand span { color: var(--sand); }
    .brand-sub {
      font-size: .8rem; font-weight: 500;
      letter-spacing: .18em; text-transform: uppercase;
      color: rgba(228,213,175,.55);
      margin-bottom: 4px;
    }
    .game-title {
      font-family: 'Playfair Display', serif;
      font-size: clamp(1.1rem, 3vw, 1.5rem);
      font-weight: 700; color: var(--white);
      margin-top: 6px;
    }
    .game-subtitle {
      font-size: .82rem; color: rgba(175,228,222,.6);
      font-style: italic; letter-spacing: .04em;
    }

    /* ── Layout ── */
    .container {
      position: relative; z-index: 1;
      width: 100%; max-width: 680px;
      padding: 8px 20px 48px;
    }
    .screen { animation: fadeIn 0.4s ease; }

    /* ── Menu cards ── */
    .activity-list { display: flex; flex-direction: column; gap: 12px; margin-bottom: 16px; }
    .activity-card {
      background: linear-gradient(145deg, var(--navy) 0%, #232848 100%);
      border: 1.5px solid rgba(175,228,222,.18);
      border-radius: 16px; padding: 18px 22px;
      display: flex; align-items: center; gap: 16px;
      cursor: pointer; text-align: left; width: 100%;
      box-shadow: 0 8px 28px rgba(0,0,0,.3);
      transition: transform 0.15s, box-shadow 0.15s, border-color 0.15s;
    }
    .activity-card:hover {
      transform: translateY(-2px);
      box-shadow: 0 14px 36px rgba(0,0,0,.4);
      border-color: rgba(175,228,222,.4);
    }
    .activity-card.done {
      border-color: rgba(175,228,222,.45);
      background: linear-gradient(145deg, #1e3a32 0%, #1a2e4a 100%);
    }
    .activity-icon { font-size: 30px; flex-shrink: 0; }
    .activity-title {
      font-family: 'Playfair Display', serif; font-weight: 700;
      color: var(--teal); font-size: 16px;
    }
    .activity-desc { color: rgba(228,213,175,.65); font-size: 13px; margin-top: 2px; }
    .activity-arrow { margin-left: auto; color: var(--teal); font-size: 22px; opacity: 0.7; }

    /* ── All-done banner ── */
    .all-done-banner {
      background: linear-gradient(135deg, rgba(175,228,222,.15), rgba(50,59,96,.4));
      border: 1.5px solid rgba(175,228,222,.3);
      border-radius: 16px; padding: 22px;
      text-align: center; animation: pop 0.4s ease;
    }
    .all-done-banner .trophy { font-size: 36px; margin-bottom: 6px; }
    .all-done-banner .title {
      font-family: 'Playfair Display', serif; font-weight: 900;
      font-size: 20px; color: var(--teal);
    }
    .all-done-banner .sub { font-size: 14px; margin-top: 4px; color: rgba(228,213,175,.75); }

    /* ── Activity screen ── */
    .activity-header { display: flex; align-items: center; margin-bottom: 14px; gap: 12px; }
    .back-btn {
      background: rgba(175,228,222,.1); border: 1.5px solid rgba(175,228,222,.25);
      border-radius: 10px; padding: 8px 14px; cursor: pointer;
      font-family: 'DM Sans', sans-serif; font-weight: 600;
      color: var(--teal); font-size: 13px; transition: 0.15s;
    }
    .back-btn:hover { background: rgba(175,228,222,.2); border-color: rgba(175,228,222,.5); }
    .activity-header-text .title {
      font-family: 'Playfair Display', serif; font-weight: 900;
      color: var(--white); font-size: 18px;
    }
    .activity-header-text .sub { color: rgba(175,228,222,.6); font-size: 12px; }

    /* ── Game card ── */
    .game-card {
      background: linear-gradient(145deg, var(--navy) 0%, #232848 100%);
      border: 1.5px solid rgba(175,228,222,.15);
      border-radius: 20px; padding: 20px;
      box-shadow: 0 20px 56px rgba(0,0,0,.4), 0 0 0 1px rgba(255,255,255,.03) inset;
      margin-bottom: 16px;
      animation: cardIn 0.4s cubic-bezier(.34,1.56,.64,1);
    }

    /* ── Matching grid ── */
    .match-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; align-items: stretch; }
    .col-label {
      font-family: 'DM Sans', sans-serif; font-weight: 600;
      color: rgba(175,228,222,.55); font-size: 11px;
      letter-spacing: 2px; text-transform: uppercase;
      margin-bottom: 10px; text-align: center;
    }
    .col-wrapper { display: flex; flex-direction: column; }
    .col-items { display: flex; flex-direction: column; gap: 8px; flex: 1; }
    .col-items .match-btn { flex: 1; }

    .match-btn {
      padding: 13px 10px; border-radius: 12px;
      border: 1.5px solid rgba(175,228,222,.18);
      background: rgba(255,255,255,.05);
      cursor: pointer; font-size: 14px; font-family: 'DM Sans', sans-serif;
      font-weight: 500; transition: all 0.18s;
      box-shadow: 0 2px 8px rgba(0,0,0,.2);
      text-align: center; color: var(--sand); width: 100%; line-height: 1.4;
    }
    .match-btn:hover:not(.matched) {
      background: rgba(175,228,222,.12);
      border-color: rgba(175,228,222,.45);
      color: var(--teal);
    }
    .match-btn.selected {
      background: rgba(175,228,222,.18);
      border-color: var(--teal);
      transform: scale(1.03);
      box-shadow: 0 4px 18px rgba(175,228,222,.2);
      color: var(--teal);
    }
    .match-btn.matched {
      background: rgba(80,200,120,.18);
      border-color: rgba(80,200,120,.55);
      color: #7ee8a2; cursor: default;
    }
    .match-btn.wrong {
      background: rgba(228,100,100,.15);
      border-color: rgba(228,100,100,.5);
      color: #f4a0a0;
      animation: shake 0.4s ease;
    }

    .match-word { font-style: italic; }
    .match-expr { font-size: 13px; }
    .season-emoji { font-size: 26px; }
    .season-word { font-size: 12px; font-style: italic; margin-top: 3px; color: rgba(228,213,175,.7); }

    /* ── Bottom bar ── */
    .bottom-bar { display: flex; align-items: center; justify-content: space-between; margin-top: 14px; }
    .progress {
      font-family: 'DM Sans', sans-serif; font-weight: 500;
      color: rgba(175,228,222,.55); font-size: 13px;
    }
    .reset-btn {
      background: rgba(255,255,255,.06); border: 1.5px solid rgba(175,228,222,.2);
      border-radius: 10px; padding: 7px 16px; cursor: pointer;
      font-family: 'DM Sans', sans-serif; font-weight: 600;
      color: rgba(175,228,222,.55); font-size: 12px; transition: 0.15s;
    }
    .reset-btn:hover { background: rgba(175,228,222,.12); color: var(--teal); border-color: rgba(175,228,222,.45); }
    .reset-all-btn {
      display: block; width: 100%; margin-top: 12px; padding: 12px;
      background: rgba(255,255,255,.04); border: 1.5px dashed rgba(175,228,222,.2);
      border-radius: 12px; cursor: pointer;
      font-family: 'DM Sans', sans-serif; font-weight: 600;
      color: rgba(175,228,222,.4); font-size: 13px; transition: 0.15s;
    }
    .reset-all-btn:hover { background: rgba(175,228,222,.08); border-color: rgba(175,228,222,.45); color: var(--teal); }

    /* ── Complete banner ── */
    .complete-banner {
      background: linear-gradient(135deg, rgba(175,228,222,.15), rgba(50,59,96,.5));
      border: 1.5px solid rgba(175,228,222,.35);
      border-radius: 16px; padding: 26px;
      text-align: center; animation: pop 0.4s ease;
    }
    .complete-banner .emoji { font-size: 46px; margin-bottom: 8px; }
    .complete-banner .title {
      font-family: 'Playfair Display', serif; font-size: 22px;
      font-weight: 700; color: var(--teal); margin-bottom: 4px;
    }
    .complete-banner .sub { font-size: 14px; color: rgba(228,213,175,.75); margin-bottom: 18px; }
    .next-btn {
      background: rgba(175,228,222,.15); color: var(--teal);
      border: 1.5px solid rgba(175,228,222,.4); border-radius: 10px;
      padding: 10px 22px; font-family: 'DM Sans', sans-serif;
      font-weight: 600; font-size: 14px; cursor: pointer; transition: 0.15s;
    }
    .next-btn:hover { background: rgba(175,228,222,.25); transform: translateY(-1px); }
  </style>
</head>

<div class="container">
  <div id="app"></div>
</div>

<script>
const CDN = "https://cdn.jsdelivr.net/gh/basmilius/weather-icons@dev/production/fill/svg/";
const weatherData = [
  { id: "pluie",  word: "la pluie",    expression: "Il pleut",          emoji: "🌧️", icon: CDN + "rain.svg" },
  { id: "soleil", word: "le soleil",   expression: "Il fait beau",      emoji: "☀️", icon: CDN + "clear-day.svg" },
  { id: "neige",  word: "la neige",    expression: "Il neige",          emoji: "❄️", icon: CDN + "snow.svg" },
  { id: "vent",   word: "le vent",     expression: "Il fait du vent",   emoji: "🌬️", icon: CDN + "wind.svg" },
  { id: "nuages", word: "les nuages",  expression: "Il fait nuageux",   emoji: "☁️", icon: CDN + "overcast.svg" },
  { id: "orage",  word: "l'orage",     expression: "Il y a un orage",   emoji: "⛈️", icon: CDN + "thunderstorms-rain.svg" },
];

const seasonData = [
  { id: "ete",       word: "l'été",        emoji: "☀️🌻", desc: "les vacances et la plage !" },
  { id: "automne",   word: "l'automne",    emoji: "🍂🍁", desc: "les feuilles tombent" },
  { id: "hiver",     word: "l'hiver",      emoji: "❄️⛄", desc: "Noël et la neige !" },
  { id: "printemps", word: "le printemps", emoji: "🌸🌷", desc: "les fleurs poussent" },
];

function shuffle(arr) { return [...arr].sort(() => Math.random() - 0.5); }

// State
let currentScreen = 'menu'; // 'menu' | 'act1' | 'act2' | 'act3'
let completed = [false, false, false];

// Game state per activity
let gameState = null;

function initGame(pairs, getLeft, getRight) {
  gameState = {
    pairs,
    leftItems: shuffle(pairs),
    rightItems: shuffle(pairs),
    getLeft,
    getRight,
    selectedLeft: null,
    selectedRight: null,
    matched: [],
    wrong: [],
    done: false,
  };
}

function render() {
  const app = document.getElementById('app');
  app.innerHTML = '';

  if (currentScreen === 'menu') {
    app.appendChild(renderMenu());
  } else {
    const actIndex = { act1: 0, act2: 1, act3: 2 }[currentScreen];
    app.appendChild(renderActivity(actIndex));
  }
}

function renderMenu() {
  const div = document.createElement('div');
  div.className = 'screen';

  const activities = [
    { title: 'Activité 1', subtitle: 'Images → Mots', desc: 'Associe chaque image avec le bon mot français', icon: '🖼️' },
    { title: 'Activité 2', subtitle: 'Mots → Expressions', desc: 'Associe chaque mot avec son expression météo', icon: '💬' },
    { title: 'Activité 3', subtitle: 'Les Saisons', desc: 'Associe chaque image avec la bonne saison', icon: '🌸' },
  ];
  const screens = ['act1', 'act2', 'act3'];

  const list = document.createElement('div');
  list.className = 'activity-list';

  activities.forEach((a, i) => {
    const card = document.createElement('button');
    card.className = 'activity-card' + (completed[i] ? ' done' : '');
    card.innerHTML = `
      <span class="activity-icon">${completed[i] ? '✅' : a.icon}</span>
      <div>
        <div class="activity-title">${a.title}: ${a.subtitle}</div>
        <div class="activity-desc">${a.desc}</div>
      </div>
      <span class="activity-arrow">›</span>
    `;
    card.onclick = () => {
      currentScreen = screens[i];
      startActivity(i);
      render();
    };
    list.appendChild(card);
  });
  div.appendChild(list);

  if (completed.every(Boolean)) {
    const banner = document.createElement('div');
    banner.className = 'all-done-banner';
    banner.innerHTML = `
      <div class="trophy">🏆</div>
      <div class="title">Félicitations!</div>
      <div class="sub">Tu as complété toutes les activités!</div>
    `;
    const resetAllBtn = document.createElement('button');
    resetAllBtn.className = 'next-btn';
    resetAllBtn.style.cssText = 'margin-top:14px;background:rgba(255,255,255,0.25);color:white;border:2px solid rgba(255,255,255,0.6);';
    resetAllBtn.textContent = '↺ Tout recommencer';
    resetAllBtn.onclick = () => { completed = [false, false, false]; gameState = null; render(); };
    banner.appendChild(resetAllBtn);
    div.appendChild(banner);
  } else if (completed.some(Boolean)) {
    const resetBtn = document.createElement('button');
    resetBtn.className = 'reset-all-btn';
    resetBtn.textContent = '↺ Réinitialiser tout';
    resetBtn.onclick = () => { completed = [false, false, false]; gameState = null; render(); };
    div.appendChild(resetBtn);
  }
  return div;
}

function startActivity(idx) {
  if (idx === 0) {
    initGame(weatherData,
      item => `<img src="${item.icon}" alt="${item.word}" style="width:64px;height:64px;display:block;margin:0 auto;" />`,
      item => `<span class="match-word">${item.word}</span>`
    );
  } else if (idx === 1) {
    initGame(weatherData,
      item => `<span class="match-word">${item.word}</span>`,
      item => `<span class="match-expr">« ${item.expression} »</span>`
    );
  } else {
    initGame(seasonData,
      item => `<div><div class="season-emoji">${item.emoji}</div><div class="season-word">${item.word}</div></div>`,
      item => `<span class="match-expr">${item.desc}</span>`
    );
  }
}

function renderActivity(actIdx) {
  const titles = ['Activité 1', 'Activité 2', 'Activité 3'];
  const subtitles = ['Images → Mots', 'Mots → Expressions', 'Les Saisons'];
  const nextScreens = ['act2', 'act3', 'menu'];
  const nextLabels = ['Activité 2', 'Activité 3', 'Menu principal'];

  const div = document.createElement('div');
  div.className = 'screen';

  // Header
  const hdr = document.createElement('div');
  hdr.className = 'activity-header';
  const backBtn = document.createElement('button');
  backBtn.className = 'back-btn';
  backBtn.textContent = '← Menu';
  backBtn.onclick = () => { currentScreen = 'menu'; render(); };
  const hdrText = document.createElement('div');
  hdrText.className = 'activity-header-text';
  hdrText.innerHTML = `<div class="title">${titles[actIdx]}</div><div class="sub">${subtitles[actIdx]}</div>`;
  hdr.appendChild(backBtn);
  hdr.appendChild(hdrText);
  div.appendChild(hdr);

  const card = document.createElement('div');
  card.className = 'game-card';

  if (completed[actIdx]) {
    card.appendChild(renderCompleteBanner(nextLabels[actIdx], () => {
      currentScreen = nextScreens[actIdx];
      if (currentScreen !== 'menu') startActivity(['act1','act2','act3'].indexOf(nextScreens[actIdx]));
      render();
    }, () => {
      completed[actIdx] = false;
      startActivity(actIdx);
      render();
    }));
  } else {
    card.appendChild(renderMatchingGame(actIdx, nextScreens, nextLabels));
  }

  div.appendChild(card);
  return div;
}

function renderMatchingGame(actIdx) {
  const gs = gameState;
  const colLabels = [
    ['Image', 'Mot français'],
    ['Nom du temps', 'Expression'],
    ['Saison', 'Description'],
  ][actIdx];

  const wrap = document.createElement('div');
  const grid = document.createElement('div');
  grid.className = 'match-grid';

  // Registry of all buttons for direct DOM updates (no full re-render)
  const btnRegistry = {};

  function applyState(btn, id, side) {
    btn.classList.remove('selected', 'matched', 'wrong');
    if (gs.matched.includes(id))      btn.classList.add('matched');
    else if (gs.wrong.includes(id))   btn.classList.add('wrong');
    else if ((side === 'left' ? gs.selectedLeft : gs.selectedRight) === id) btn.classList.add('selected');
  }

  function refreshAllButtons() {
    for (const key in btnRegistry) {
      const [s, id] = key.split('|');
      applyState(btnRegistry[key], id, s);
    }
  }

  ['left', 'right'].forEach((side, si) => {
    const col = document.createElement('div');
    col.className = 'col-wrapper';
    const lbl = document.createElement('div');
    lbl.className = 'col-label';
    lbl.textContent = colLabels[si];
    col.appendChild(lbl);

    const items = document.createElement('div');
    items.className = 'col-items';

    const list = side === 'left' ? gs.leftItems : gs.rightItems;
    list.forEach(item => {
      const btn = document.createElement('button');
      btn.className = 'match-btn';
      btn.innerHTML = side === 'left' ? gs.getLeft(item) : gs.getRight(item);
      applyState(btn, item.id, side);
      btnRegistry[`${side}|${item.id}`] = btn;

      btn.onclick = () => {
        if (gs.matched.includes(item.id)) return;

        gs.wrong = [];
        if (side === 'left') gs.selectedLeft = item.id;
        else gs.selectedRight = item.id;
        refreshAllButtons();

        if (gs.selectedLeft && gs.selectedRight) {
          if (gs.selectedLeft === gs.selectedRight) {
            gs.matched.push(gs.selectedLeft);
            gs.selectedLeft = null;
            gs.selectedRight = null;
            refreshAllButtons();
            prog.textContent = `✅ ${gs.matched.length} / ${gs.pairs.length} trouvés`;
            if (gs.matched.length === gs.pairs.length) {
              completed[actIdx] = true;
              setTimeout(() => render(), 600);
            }
          } else {
            gs.wrong = [gs.selectedLeft, gs.selectedRight];
            refreshAllButtons();
            setTimeout(() => {
              gs.wrong = [];
              gs.selectedLeft = null;
              gs.selectedRight = null;
              refreshAllButtons();
            }, 700);
          }
        }
      };
      items.appendChild(btn);
    });
    col.appendChild(items);
    grid.appendChild(col);
  });

  wrap.appendChild(grid);

  const bottomBar = document.createElement('div');
  bottomBar.className = 'bottom-bar';

  const prog = document.createElement('div');
  prog.className = 'progress';
  prog.style.marginTop = '0';
  prog.textContent = `✅ ${gs.matched.length} / ${gs.pairs.length} trouvés`;

  const resetBtn = document.createElement('button');
  resetBtn.className = 'reset-btn';
  resetBtn.textContent = '↺ Recommencer';
  resetBtn.onclick = () => { startActivity(actIdx); render(); };

  bottomBar.appendChild(prog);
  bottomBar.appendChild(resetBtn);
  wrap.appendChild(bottomBar);

  return wrap;
}

function renderCompleteBanner(nextLabel, onNext, onReplay) {
  const div = document.createElement('div');
  div.className = 'complete-banner';
  div.innerHTML = `
    <div class="emoji">🎉</div>
    <div class="title">Bravo! Parfait!</div>
    <div class="sub">Tu as tout trouvé!</div>
    <div style="display:flex;gap:10px;justify-content:center;flex-wrap:wrap;">
  `;
  const replayBtn = document.createElement('button');
  replayBtn.className = 'next-btn';
  replayBtn.style.background = 'rgba(255,255,255,0.25)';
  replayBtn.style.color = 'white';
  replayBtn.style.border = '2px solid rgba(255,255,255,0.6)';
  replayBtn.textContent = '↺ Rejouer';
  replayBtn.onclick = onReplay;

  const btn = document.createElement('button');
  btn.className = 'next-btn';
  btn.textContent = nextLabel + ' →';
  btn.onclick = onNext;

  div.querySelector('div[style]').appendChild(replayBtn);
  div.querySelector('div[style]').appendChild(btn);
  return div;
}

// Init
render();
</script>
